<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LLMWiki</title>
  </head>
  <body style="font-family:system-ui,-apple-system,sans-serif;max-width:420px;margin:0 auto;padding:40px 22px;text-align:center;color:#111">
    <h1 style="font-size:24px;margin-bottom:6px">LLMWiki</h1>
    <p id="msg" style="color:#555">앱을 여는 중…</p>
    <p>
      <button id="pairbtn" onclick="openApp()"
        style="display:none;background:#2563eb;color:#fff;border:0;padding:14px 24px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer">📲 앱에서 열기 / 연동</button>
    </p>
    <p>
      <a id="apk" href="https://github.com/mynameisjinhohong/llmwiki-app/releases/latest/download/llmwiki.apk"
         style="display:none;background:#e5e7eb;color:#111;padding:12px 20px;border-radius:10px;text-decoration:none;font-weight:600">⬇️ 설치 / 업데이트 (APK)</a>
    </p>
    <p style="color:#9ca3af;font-size:12px;margin-top:28px">Android · 첫 설치 시 "출처를 알 수 없는 앱" 허용 필요</p>
    <script>
      // Pairing data rides in the URL #fragment (not sent to the server). Fall back to ?d=.
      var d = (location.hash.match(/[#&]d=([^&]+)/) || [])[1] || new URLSearchParams(location.search).get('d');
      function openApp() { if (d) location.href = 'llmwiki://pair?d=' + d; }
      var left = false;
      document.addEventListener('visibilitychange', function () { if (document.hidden) left = true; });

      // The install/update button is ALWAYS available — so an already-installed phone that
      // scans the QR can still grab a newer APK, not just sync settings.
      document.getElementById('apk').style.display = 'inline-block';
      if (d) document.getElementById('pairbtn').style.display = 'inline-block';

      if (d) openApp(); // if the app is installed it takes over here (pairs); the buttons remain for updating
      setTimeout(function () {
        document.getElementById('msg').textContent = d
          ? '연동은 앱이 열리면 자동 진행됩니다. 새 버전이 있으면 앱이 업데이트를 안내하고, 아래 버튼으로 직접 설치/업데이트할 수도 있습니다.'
          : '앱을 설치하거나 최신 버전으로 업데이트하세요.';
      }, 1200);
    </script>
  </body>
</html>
